okf_version: "0.1"
project:
  name: "ZinharCMS"
  repository: "https://github.com/sasanzare/ZinharCMS"
  repository_name: "ZinharCMS"
  knowledge_status: "in_progress"
  current_phase: 6
  current_phase_status: "complete"
  last_verified_commit: "eed1e0dbdf6d873457d1165158b3c8fbfd6647e1"
  last_verified_date: "2026-07-18"

authority:
  source_of_truth: "Current implementation and repository configuration"
  priority:
    - "current_source_code"
    - "current_configuration_and_manifests"
    - "database_migrations_and_schemas"
    - "tests"
    - "current_deployment_configuration"
    - "existing_technical_documentation"
    - "phase_zero_analysis"
    - "repository_structure_inference"

path_conventions:
  document_paths: "Relative to okf/"
  evidence_paths: "Relative to the repository root"

entry_points:
  human:
    - path: "README.md"
      purpose: "Main introduction, authority model, and current OKF navigation"
    - path: "project/overview.md"
      purpose: "High-level project identity, purpose, capabilities, and boundaries"
    - path: "architecture/README.md"
      purpose: "Phase 2 architecture entry point and reading order"
    - path: "architecture/overview.md"
      purpose: "Verified system classification and runtime shape"
    - path: "backend/README.md"
      purpose: "Phase 3 backend documentation entry point and reading order"
    - path: "backend/module-catalog.md"
      purpose: "Catalog of significant backend modules and owning documents"
    - path: "frontend/README.md"
      purpose: "Phase 4 frontend architecture entry point and reading order"
    - path: "frontend/feature-catalog.md"
      purpose: "Catalog of significant frontend features and owning documents"
    - path: "database/README.md"
      purpose: "Phase 5 database architecture entry point and reading order"
    - path: "database/entity-catalog.md"
      purpose: "Catalog of significant database entity groups and owning documents"
    - path: "api/README.md"
      purpose: "Phase 6 API architecture and contracts entry point"
    - path: "api/endpoint-catalog.md"
      purpose: "Exhaustive registered endpoint inventory and family navigation"
    - path: "project/navigation-guide.md"
      purpose: "Short task-oriented navigation guide"
  ai:
    - path: "index.yaml"
      purpose: "Machine-readable knowledge index and verification metadata"
    - path: "project/overview.md"
      purpose: "Verified high-level project context"
    - path: "project/repository-map.md"
      purpose: "Repository source-location map"
    - path: "architecture/overview.md"
      purpose: "Verified architecture classification and runtime context"
    - path: "architecture/dependency-model.md"
      purpose: "Source and runtime dependency direction"
    - path: "backend/overview.md"
      purpose: "Verified backend identity, structure, and module navigation"
    - path: "backend/module-catalog.md"
      purpose: "Significant module selection, ownership, and source paths"
    - path: "backend/dependency-map.md"
      purpose: "Backend module, infrastructure, persistence, and provider dependencies"
    - path: "frontend/overview.md"
      purpose: "Verified frontend runtime shape, application boundary, and major findings"
    - path: "frontend/feature-catalog.md"
      purpose: "Significant frontend feature selection, ownership, and source paths"
    - path: "frontend/feature-boundaries.md"
      purpose: "Frontend route, page, component, state, API, test, permission, and asset ownership"
    - path: "frontend/state-management.md"
      purpose: "Reactive, persistent, route-local, and transport state ownership"
    - path: "database/schema-catalog.md"
      purpose: "Migration-defined schema object inventory and runtime-status caveat"
    - path: "database/relationships.md"
      purpose: "Foreign-key, logical relationship, and tenant-coherence map"
    - path: "database/multi-tenancy.md"
      purpose: "Tenant context, RLS, bypass, and isolation evidence"
    - path: "api/route-architecture.md"
      purpose: "Verified router composition, access zones, and middleware boundaries"
    - path: "api/endpoint-catalog.md"
      purpose: "All registered methods, paths, handlers, inputs, outputs, clients, and family links"
    - path: "api/openapi-consistency.md"
      purpose: "Runtime registration versus generated OpenAPI consistency findings"
    - path: "project/navigation-guide.md"
      purpose: "Task-to-source navigation and AI agent rules"

