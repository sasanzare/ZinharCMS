    - id: "AUTHORIZATION_BEHAVIOR_UNVERIFIED ABV-01"
      summary: "Frontend route admission and role cues are not security boundaries and are not a complete action-by-action proof of backend enforcement"

  duplicated_contract:
    - id: "DUPLICATED_CONTRACT DC-01"
      summary: "Frontend request and response types duplicate backend contracts without one shared schema authority"

  ui_behavior_unverified:
    - id: "UI_BEHAVIOR_UNVERIFIED UBU-01"
