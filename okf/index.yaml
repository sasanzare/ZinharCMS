    - id: "DEAD_OR_UNUSED_CODE_UNCONFIRMED DU-02"
      summary: "React Hook Form, Hook Form resolvers, and Zod are declared dependencies without verified imports under frontend/src"

  schema_runtime_status_unknown:
    - id: "SCHEMA_RUNTIME_STATUS_UNKNOWN SRU-01"
      summary: "Migration-defined objects were inventoried, but applied state and deployed catalog equivalence were not inspected"

  migration_model_conflict:
    - id: "MIGRATION_MODEL_CONFLICT MMC-01"
      summary: "The shared PageStatus model omits pending_review, which migration 0006 adds to page_status"
    - id: "MIGRATION_MODEL_CONFLICT MMC-02"
      summary: "Several shared CMS models omit migration-defined organization_id columns and act as partial projections"

  entity_ownership_unclear:
    - id: "ENTITY_OWNERSHIP_UNCLEAR EOU-01"
      summary: "Shared audit and operational persistence has writers and readers across multiple backend modules"

  relationship_unclear:
    - id: "RELATIONSHIP_UNCLEAR RLU-01"
      summary: "Comment targets are polymorphic through entity_type and entity_id without a conventional target foreign key"
    - id: "RELATIONSHIP_UNCLEAR RLU-02"
      summary: "Audit subjects are polymorphic through entity_type and entity_id without a conventional target foreign key"

  tenant_isolation_unverified:
    - id: "TENANT_ISOLATION_UNVERIFIED TIV-01"
      summary: "Separate tenant and parent foreign keys do not universally prove same-organization parent-child coherence"

  constraint_coverage_unclear:
    - id: "CONSTRAINT_COVERAGE_UNCLEAR CCU-01"
      summary: "Composite same-tenant constraints are not present for every child that stores both organization and parent IDs"
    - id: "CONSTRAINT_COVERAGE_UNCLEAR CCU-02"
      summary: "Checked text statuses and application mappings may drift without one shared status contract"

  index_purpose_unclear:
    - id: "INDEX_PURPOSE_UNCLEAR IPU-01"
      summary: "Several indexes look redundant with uniqueness structures, but no workload or plan evidence supports removal"

  transaction_boundary_unclear:
    - id: "TRANSACTION_BOUNDARY_UNCLEAR TBU-01"
      summary: "Media filesystem and database changes do not share one atomic resource transaction"
    - id: "TRANSACTION_BOUNDARY_UNCLEAR TBU-02"
      summary: "Organization creation commits domain state before a separate audit transaction"
    - id: "TRANSACTION_BOUNDARY_UNCLEAR TBU-03"
      summary: "Paid Marketplace checkout spans committed database state and an external payment-provider call"
    - id: "TRANSACTION_BOUNDARY_UNCLEAR TBU-04"
      summary: "CMS webhook dispatch is spawned in-process without a durable queue or outbox guarantee"

  soft_delete_behavior_unclear:
    - id: "SOFT_DELETE_BEHAVIOR_UNCLEAR SDBU-01"
      summary: "The schema uses mixed hard deletion, archival, and installation-uninstall lifecycle patterns"

  data_lifecycle_unclear:
    - id: "DATA_LIFECYCLE_UNCLEAR DLU-01"
      summary: "No repository-wide retention, anonymization, archival, legal-hold, or purge policy was found"
    - id: "DATA_LIFECYCLE_UNCLEAR DLU-02"
      summary: "Entity-specific hard delete, archive, replacement, and uninstall behavior is not governed by one lifecycle policy"

