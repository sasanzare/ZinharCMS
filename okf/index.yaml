    - id: "DEPENDENCY_DIRECTION_UNCLEAR DDU-01"
      summary: "Middleware and services have verified bidirectional source coupling through claims, tenant context, and service functions"
    - id: "DEPENDENCY_DIRECTION_UNCLEAR DDU-02"
      summary: "The health service imports a route-owned response type"
    - id: "DEPENDENCY_DIRECTION_UNCLEAR DDU-03"
      summary: "Frontend and backend contracts are manually duplicated without a generated or shared schema authority"
    - id: "DEPENDENCY_DIRECTION_UNCLEAR DDU-04"
      summary: "Pages and Marketplace adapters have verified cross-domain and reverse-layer source dependencies"
    - id: "DEPENDENCY_DIRECTION_UNCLEAR DDU-05"
