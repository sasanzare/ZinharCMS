      summary: "Route, service, and persistence responsibilities are not consistently separated"
    - id: "ARCHITECTURAL_BOUNDARY_UNCLEAR ABU-02"
      summary: "Data ownership is spread across route modules, services, migrations, and shared infrastructure"
    - id: "ARCHITECTURAL_BOUNDARY_UNCLEAR ABU-03"
      summary: "Preview and external side effects remain in the web process without a durable worker boundary"

