  module_boundary_unclear:
    - id: "MODULE_BOUNDARY_UNCLEAR MBU-01"
      summary: "Tenant authorization is cross-cutting and resource-specific enforcement remains distributed"
    - id: "MODULE_BOUNDARY_UNCLEAR MBU-02"
      summary: "Content ownership spans routes, validation, workflow, delivery invalidation, and persistence"
    - id: "MODULE_BOUNDARY_UNCLEAR MBU-03"
      summary: "Media ownership spans database metadata, filesystem content, processing, and public serving"
    - id: "MODULE_BOUNDARY_UNCLEAR MBU-04"
      summary: "Pages, builder, preview, plugins, delivery, and Marketplace adapters cross feature boundaries"
    - id: "MODULE_BOUNDARY_UNCLEAR MBU-05"
      summary: "CMS webhook event ownership crosses domain producers and delivery infrastructure"
    - id: "MODULE_BOUNDARY_UNCLEAR MBU-06"
