  current_phase: 3
  current_phase_status: "complete"
  last_verified_commit: "debde2021c029d1827abaa38bcc32c682f53f55a"
  last_verified_date: "2026-07-17"

authority:
  source_of_truth: "Current implementation and repository configuration"
  priority:
    - "current_source_code"
    - "current_configuration_and_manifests"
    - "database_migrations_and_schemas"
    - "tests"
    - "current_deployment_configuration"
    - "existing_technical_documentation"
    - "phase_zero_analysis"
    - "repository_structure_inference"

path_conventions:
  document_paths: "Relative to okf/"
  evidence_paths: "Relative to the repository root"

entry_points:
  human:
    - path: "README.md"
      purpose: "Main introduction, authority model, and current OKF navigation"
    - path: "project/overview.md"
      purpose: "High-level project identity, purpose, capabilities, and boundaries"
    - path: "architecture/README.md"
      purpose: "Phase 2 architecture entry point and reading order"
    - path: "architecture/overview.md"
      purpose: "Verified system classification and runtime shape"
    - path: "backend/README.md"
      purpose: "Phase 3 backend documentation entry point and reading order"
    - path: "backend/module-catalog.md"
      purpose: "Catalog of significant backend modules and owning documents"
    - path: "project/navigation-guide.md"
      purpose: "Short task-oriented navigation guide"
  ai:
    - path: "index.yaml"
      purpose: "Machine-readable knowledge index and verification metadata"
    - path: "project/overview.md"
      purpose: "Verified high-level project context"
    - path: "project/repository-map.md"
      purpose: "Repository source-location map"
    - path: "architecture/overview.md"
      purpose: "Verified architecture classification and runtime context"
    - path: "architecture/dependency-model.md"
      purpose: "Source and runtime dependency direction"
    - path: "backend/overview.md"
      purpose: "Verified backend identity, structure, and module navigation"
    - path: "backend/module-catalog.md"
      purpose: "Significant module selection, ownership, and source paths"
    - path: "backend/dependency-map.md"
      purpose: "Backend module, infrastructure, persistence, and provider dependencies"
    - path: "project/navigation-guide.md"
      purpose: "Task-to-source navigation and AI agent rules"

