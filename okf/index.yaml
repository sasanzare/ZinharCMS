  state_ownership_unclear:
    - id: "STATE_OWNERSHIP_UNCLEAR SOU-01"
      summary: "Session and active-organization state is synchronized across Zustand, API module variables, and browser storage"
    - id: "STATE_OWNERSHIP_UNCLEAR SOU-02"
      summary: "Server responses are page-local without a shared cache, tenant-keying, invalidation, cancellation, or deduplication contract"

  api_contract_unclear:
    - id: "API_CONTRACT_UNCLEAR ACU-01"
      summary: "The handwritten frontend client and TypeScript types have no generated or runtime-validated equivalence to backend contracts"
    - id: "API_CONTRACT_UNCLEAR ACU-02"
      summary: "Phase 6 documents registered behavior, but dynamic JSON, framework rejections, provider responses, and branch-specific contracts are not one closed schema"

  openapi_implementation_conflict:
    - id: "OPENAPI_IMPLEMENTATION_CONFLICT OIC-01"
      summary: "Nineteen registered handlers and all bearer and tenant-header security requirements are absent from generated OpenAPI"

  request_contract_unclear:
    - id: "REQUEST_CONTRACT_UNCLEAR RCU-01"
      summary: "Axum extraction and rejection bodies are not normalized through the application validation envelope"
    - id: "REQUEST_CONTRACT_UNCLEAR RCU-02"
      summary: "Multipart rejection and framing-overhead behavior is partly framework-dependent"

  response_contract_unclear:
    - id: "RESPONSE_CONTRACT_UNCLEAR RSCU-01"
      summary: "Dynamic JSON, provider branches, and WebSocket behavior prevent one closed response schema for every operation"
    - id: "RESPONSE_CONTRACT_UNCLEAR RSCU-02"
      summary: "Static-file method, range, conditional-request, and error behavior is delegated to Tower HTTP and lacks repository contract tests"

  error_contract_unclear:
    - id: "ERROR_CONTRACT_UNCLEAR ECU-01"
      summary: "Framework, middleware, timeout, static-file, and WebSocket failures do not uniformly use ErrorBody"

  authentication_requirement_unclear:
    - id: "AUTHENTICATION_REQUIREMENT_UNCLEAR ARU-01"
      summary: "OpenAPI does not represent bearer or preview-query authentication requirements; router composition is authoritative"

  authorization_requirement_unclear:
    - id: "AUTHORIZATION_REQUIREMENT_UNCLEAR AZU-01"
      summary: "Authorization is distributed across router placement, RBAC helpers, ownership rules, workflow state, and RLS"

  tenant_context_unclear:
    - id: "TENANT_CONTEXT_UNCLEAR TCU-01"
      summary: "OpenAPI does not represent X-Organization-Id or preview organization query context; middleware and explicit global paths are authoritative"

  versioning_behavior_unclear:
    - id: "VERSIONING_BEHAVIOR_UNCLEAR VBU-01"
      summary: "Only public delivery uses /api/v1 and no repository-wide compatibility, deprecation, or support-window policy was found"

  frontend_backend_contract_conflict:
    - id: "FRONTEND_BACKEND_CONTRACT_CONFLICT FBCC-01"
      summary: "Reserved marker for method, path, DTO, auth, or status drift; all 141 current frontend method/path pairs match registration"

