  module_ownership_unclear:
    - id: "MODULE_OWNERSHIP_UNCLEAR MOU-01"
      summary: "Authentication middleware owns Claims while protected domain modules consume the contract"
    - id: "MODULE_OWNERSHIP_UNCLEAR MOU-02"
      summary: "Tenant middleware owns TenantContext while tenant domain modules consume and extend enforcement"
    - id: "MODULE_OWNERSHIP_UNCLEAR MOU-03"
      summary: "Editorial comment authorization depends on polymorphic resource ownership"
    - id: "MODULE_OWNERSHIP_UNCLEAR MOU-04"
      summary: "Media lifecycle ownership is split between metadata, files, processing, and serving"
    - id: "MODULE_OWNERSHIP_UNCLEAR MOU-05"
