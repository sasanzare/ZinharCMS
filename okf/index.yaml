    - path: "index.yaml"
      purpose: "Machine-readable knowledge index and verification metadata"
    - path: "project/overview.md"
      purpose: "Verified high-level project context"
    - path: "project/repository-map.md"
      purpose: "Repository source-location map"
    - path: "architecture/overview.md"
      purpose: "Verified architecture classification and runtime context"
    - path: "architecture/dependency-model.md"
      purpose: "Source and runtime dependency direction"
    - path: "project/navigation-guide.md"
      purpose: "Task-to-source navigation and AI agent rules"

